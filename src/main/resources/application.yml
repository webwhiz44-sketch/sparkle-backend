spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sparkle_stag}
    username: ${DB_USERNAME:postgres44}
    password: ${DB_PASSWORD:simran44}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:6a8d73b2f9e1c4a0d5f2b8e7c3a9d6f0e4b1c8a5d2f9b6e3a0c7d4f1b8e5a2}
  access-token-expiry: 900000       # 15 minutes
  refresh-token-expiry: 604800000   # 7 days

file:
  upload-dir: ${FILE_UPLOAD_DIR:./uploads}

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.womensocial.app: DEBUG
    org.springframework.security: INFO
