spring:
  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/sparkle_stag}
    username: ${DB_USERNAME:postgres44}
    password: ${DB_PASSWORD:simran44}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  mail:
    host: ${MAIL_HOST:smtp.gmail.com}
    port: ${MAIL_PORT:587}
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true
            required: true

  servlet:
    multipart:
      enabled: true
      max-file-size: 5MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET:6a8d73b2f9e1c4a0d5f2b8e7c3a9d6f0e4b1c8a5d2f9b6e3a0c7d4f1b8e5a2}
  access-token-expiry: 900000       # 15 minutes
  refresh-token-expiry: 604800000   # 7 days

aws:
  region: ${AWS_REGION:ap-south-1}

face:
  verification:
    liveness-confidence-threshold: ${FACE_LIVENESS_THRESHOLD:90.0}
    gender-confidence-threshold: ${FACE_GENDER_THRESHOLD:85.0}
    token-expiry-minutes: ${FACE_TOKEN_EXPIRY_MINUTES:15}

gcp:
  storage:
    bucket-name: ${GCS_BUCKET_NAME:sparkle-media-prod}

server:
  port: 8080

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

app:
  mail:
    from: ${MAIL_FROM:noreply@sparkle.app}
  frontend-url: ${FRONTEND_URL:http://localhost:3000}
  password-reset:
    expiry-minutes: 30

logging:
  level:
    com.womensocial.app: DEBUG
    org.springframework.security: INFO
